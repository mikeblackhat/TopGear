<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />



    <title>Dash</title>
<link rel="icon" href="icon.png">
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css?family=Press+Start+2P"
    />

    <style>
      body {
        background: #222;
        font-family: "Press Start 2P", monospace;
        font-smooth: never;
        height: 98vh;
      }

      /* UI */
      .topUI {
        position: absolute;
        z-index: 1000; /* need this cause clip-path changes stack context */
        transform: translate(-50%, 25px);
        text-shadow: -2px 0 black, 0 2px black, 2px 0 black, 0 -2px black;
        letter-spacing: 2px;
        color: #fff;
        font-size: 17px;
      }
      .topUI::before {
        display: inline-block;
        height: 17px;
        padding: 1px 2px;
        line-height: 19px;
        font-size: 17px;
        background: #fff;
        text-shadow: none;
        font-weight: 900;
        letter-spacing: 0;
        border-radius: 6px;
        margin-right: 30px;
        border: 2px solid #7dd8c9;
      }
      #time {
        left: 13%;
        color: #f4f430;
      }
      #time::before {
        content: "TIME";
        color: #f57214;
      }
      #score {
        left: 45%;
      }
      #score::before {
        content: "SCORE";
        color: #a61a9d;
      }
      #lap {
        left: 88%;
        width: 45%;
      }
      #lap::before {
        content: "LAP";
        color: #0082df;
      }

      #tacho {
        position: absolute;
        text-align: right;
        width: 23%;
        bottom: 5%;
        z-index: 2000;
        color: #e62e13;
        text-shadow: -2px 0 black, 0 2px black, 2px 0 black, 0 -2px black;
        letter-spacing: 2px;
        font-size: 23px;
      }
      #tacho::after {
        content: "km/h";
        color: #fab453;
        font-size: 18px;
        margin-left: 5px;
      }

      /*
  road
*/
      #game {
        position: relative;
        margin: 0 auto;
        overflow: hidden;
        background: #222;
        user-select: none;
        transition: opacity 10s;
      }
      #road {
        transition: opacity 2s;
        transition-timing-function: steps(8, end);
      }
      #road * {
        position: absolute;
        image-rendering: pixelated;
      }
      #hero {
        background-repeat: no-repeat;
        background-position: -110px 0;
        z-index: 2000;
        transform: scale(1.4);
      }
      #cloud {
        background-size: auto 100%;
        width: 100%;
        height: 57%;
      }

      /*
  home
*/
      #road {
        position: absolute;
        width: 100%;
        height: 100%;
      }

      #home {
        position: absolute;
        color: #fff;
        width: 100%;
        height: 100%;

        z-index: 1000; /* need this cause clip-path changes stack context */
      }

      #highscore {
        position: absolute;
        width: 100%;
        height: 20%;
        bottom: 0;
        column-count: 3;
        column-fill: auto;
      }

      #highscore * {
        color: #9e95a8;
        margin: 0 0 6px 27px;
      }

      h1 {
        position: absolute;
        left: 50%;
        top: 25%;
        transform: translate(-50%, -50%);
        font-size: 5em;

        background: -webkit-linear-gradient(#25d8b1, #e2bbf0);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      #text {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        font-size: 1.2em;
        color: #d9bbf3;
        text-shadow: 0 0 black, 0 2px black, 2px 0 black, 0 0 black;
      }

      .blink {
        animation: blinker 2s steps(4, end) infinite;
      }
      @keyframes blinker {
        50% {
          opacity: 0;
        }
      }

      /*
  Guide
*/
      #controls {
        color: #868686;
        font-size: 13px;
        line-height: 13px;
        margin: 10px;
        text-align: center;
      }
      #controls > span {
        margin-left: 20px;
      }
      #controls > span > span {
        border: 2px solid #868686;
        border-radius: 5px;
        padding: 7px;
        margin-right: 10px;
        display: inline-block;
      }
      #controls > span.vertical-keys > span.rotatable {
        transform: rotate(90deg);
      }
      #gamepad-debug {
        position: absolute;
        top: 10px;
        right: 10px;
        background: rgba(0, 0, 0, 0.85);
        color: #00ff00;
        font-family: monospace;
        font-size: 10px;
        padding: 10px;
        border-radius: 5px;
        border: 1px solid #00ff00;
        z-index: 9999;
        pointer-events: none;
        display: none;
        max-width: 250px;
        max-height: 480px;
        overflow-y: auto;
        line-height: 1.2em;
        text-align: left;
      }
      #config-btn {
        position: absolute;
        left: 50%;
        top: 65%;
        transform: translate(-50%, -50%);
        font-family: "Press Start 2P", monospace;
        font-size: 11px;
        background: #333;
        color: #00ff00;
        border: 2px solid #00ff00;
        padding: 8px 16px;
        cursor: pointer;
        border-radius: 5px;
        box-shadow: 0 4px 0 #00aa00;
        z-index: 1001;
      }
      #config-btn:active {
        box-shadow: none;
        transform: translate(-50%, -46%);
      }
      #config-overlay {
        position: absolute;
        width: 100%;
        height: 100%;
        background: rgba(17, 17, 17, 0.95);
        color: #fff;
        z-index: 5000;
        display: none;
        box-sizing: border-box;
        padding: 20px;
        text-align: center;
        overflow-y: auto;
      }
      #config-overlay h2 {
        font-size: 18px;
        color: #e2bbf0;
        margin-top: 10px;
        margin-bottom: 20px;
        text-shadow: 0 2px #555;
      }
      .config-table {
        margin: 0 auto;
        border-collapse: collapse;
        width: 95%;
        max-width: 600px;
        font-size: 9px;
      }
      .config-table th {
        color: #a61a9d;
        padding: 8px;
        border-bottom: 2px solid #a61a9d;
      }
      .config-table td {
        padding: 8px;
        border-bottom: 1px solid #333;
        vertical-align: middle;
      }
      .config-btn-small {
        font-family: "Press Start 2P", monospace;
        font-size: 8px;
        background: #222;
        color: #ffff00;
        border: 1px solid #ffff00;
        padding: 5px 10px;
        cursor: pointer;
        width: 100%;
        box-sizing: border-box;
        border-radius: 3px;
      }
      .config-btn-small:hover {
        background: #ffff00;
        color: #000;
      }
      #close-config-btn {
        margin-top: 20px;
        font-family: "Press Start 2P", monospace;
        font-size: 11px;
        background: #333;
        color: #ff5555;
        border: 2px solid #ff5555;
        padding: 8px 16px;
        cursor: pointer;
        border-radius: 5px;
        box-shadow: 0 4px 0 #aa0000;
        display: inline-block;
      }
      #close-config-btn:active {
        box-shadow: none;
        transform: translateY(4px);
      }
      #reset-config-btn {
        margin-top: 20px;
        margin-right: 15px;
        font-family: "Press Start 2P", monospace;
        font-size: 11px;
        background: #333;
        color: #ffaa00;
        border: 2px solid #ffaa00;
        padding: 8px 16px;
        cursor: pointer;
        border-radius: 5px;
        box-shadow: 0 4px 0 #aa5500;
        display: inline-block;
      }
      #reset-config-btn:active {
        box-shadow: none;
        transform: translateY(4px);
      }
      .binding-prompt {
        color: #00ffff !important;
        font-weight: bold;
        animation: blinker 1s steps(2, start) infinite;
      }
      #pause-overlay {
        position: absolute;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.6);
        color: #ffaa00;
        z-index: 4000;
        display: none;
        box-sizing: border-box;
        text-align: center;
        line-height: 500px; /* matches game height */
        font-size: 32px;
        text-shadow: -3px 0 black, 0 3px black, 3px 0 black, 0 -3px black;
      }
    </style>

    <script>
      window.console = window.console || function (t) {};
    </script>

    <script>
      if (document.location.search.match(/type=embed/gi)) {
        window.parent.postMessage("resize", "*");
      }
    </script>
  </head>

  <body translate="no">
    <div id="game">
      <div id="pause-overlay" class="blink">PAUSE</div>
      <div id="gamepad-debug"></div>
      <div id="road">
        <div id="cloud"></div>
        <div id="hero"></div>
      </div>

      <div id="hud">
        <span id="time" class="topUI">0</span>
        <span id="score" class="topUI">0</span>
        <span id="lap" class="topUI">0'00"000</span>
        <span id="tacho">0</span>
      </div>

      <div id="home">
        <h1>Dash</h1>
        <p id="text"></p>

        <div id="highscore"></div>
        <button id="config-btn">CONTROLES</button>
      </div>

      <div id="config-overlay">
        <h2>CONFIGURAR CONTROLES</h2>
        <table class="config-table">
          <thead>
            <tr>
              <th style="text-align:left;">Acción</th>
              <th>Teclado</th>
              <th>Mando / Joystick</th>
            </tr>
          </thead>
          <tbody id="config-tbody">
            <!-- Populated dynamically by JS -->
          </tbody>
        </table>
        <div style="margin-top: 20px;">
          <button id="reset-config-btn" onclick="resetToDefaults()">RESTABLECER</button>
          <button id="close-config-btn" style="margin-top:0;">GUARDAR Y SALIR</button>
        </div>
      </div>
    </div>

    <div id="controls">
      <span><span>C</span> / <span>START</span>insert coin</span>
      <span><span>M</span>mute</span>
      <span><span>&lt;</span><span>&gt;</span> / <span>L-STICK</span>move</span>
      <span class="vertical-keys"><span class="rotatable">&lt;</span><span class="rotatable">&gt;</span> / <span>A / RT</span>accelerate</span>
    </div>
    <script src="javascript/1.js"></script>
    <script src="javascript/constants.js"></script>
    <script src="javascript/audio.js"></script>
    <script src="javascript/gamepad.js"></script>
    <script src="javascript/road.js"></script>
    <script src="javascript/game.js"></script>
    <script src="javascript/null.js"></script>
  </body>
</html>
